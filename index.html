<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de contact </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Formulaire de contact</h1>

    <form action="#" method="post">

        <label for="pseudo">Votre Pseudo *</label>
        <input type="text" id="pseudo" name="pseudo" placeholder="Votre pseudo">

        <label for="password">Votre Mot de passe *</label>
        <input type="password" id="password" name="password" placeholder="Votre mot de passe">

        <label for="email">Votre e-mail *</label>
        <input type="email" id="email" name="email" placeholder="Votre adresse e-mail">

        <label for="objet">Objet du message *</label>
        <select type="objet" id="objet" name="objet">
            <option value="question">J'ai une question</option>
            <option value="suggestion">J'ai une suggestion</option>
            <option value="problème">J'ai un problème</option>
            <option value="autre">autre</option>
        </select>

        <label for="message">Votre message *</label>
        <textarea id="message" name="message" placeholder="Votre message" rows="5"></textarea>

        <label>Niveau d'urgence *</label>
        <input type="radio" id="urgent" name="urgence" requierd>Urgent
        <input type="radio" id="normal" name="urgence"requierd>Normal
        <input type="radio" id="lent" name="urgence" checked requierd>Lent

        <input type="checkbox" id="confidentialite" name="confidentialite" required>
        <label for="confidentialite">j'ai lu et j'accepte la <a href="#">pomitique de confidentialité</a> du site</label>

        <button type="submit">Envoyer</button>




</body>

</html>
